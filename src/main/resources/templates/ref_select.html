<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${title}">問合せ先選択</title>
    <style>
        body { font-family: "Meiryo", "MS PGothic", sans-serif; margin: 16px; }
        .title { font-size: 20px; font-weight: bold; margin-bottom: 12px; }
        .section { border: 1px solid #ccc; padding: 12px; margin-bottom: 12px; }
        .section-title { font-weight: bold; margin-bottom: 8px; }
        .row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 8px; }
        .field { display: flex; flex-direction: column; min-width: 200px; }
        label { font-size: 12px; margin-bottom: 4px; }
        input[type="text"] { padding: 4px; }
        .buttons { display: flex; gap: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 6px; text-align: left; }
        th { background: #f5f5f5; }
        .footer { display: flex; justify-content: flex-end; gap: 8px; }
    </style>
</head>
<body>
    <div class="title" th:text="${title}">問合せ先選択</div>

    <div class="section">
        <div class="section-title">
            <button id="accordion" type="button">検索条件</button>
        </div>
        <div class="row">
            <div class="field">
                <label for="txtRefNm">問合せ先名称</label>
                <input id="txtRefNm" name="txtRefNm" type="text" maxlength="100"/>
            </div>
            <div class="field">
                <label for="txtRefKn">問合せ先名称カナ</label>
                <input id="txtRefKn" name="txtRefKn" type="text" maxlength="200"/>
            </div>
            <div class="field">
                <label for="telno">電話番号</label>
                <input id="telno" name="telno" type="text" maxlength="13"/>
            </div>
            <div class="field" style="min-width: 280px;">
                <label for="urlAheadSearch">URLアドレス</label>
                <input id="urlAheadSearch" name="urlAheadSearch" type="text" maxlength="256"/>
            </div>
        </div>
        <div class="row">
            <div class="field" style="min-width: 100%;">
                <label>地域</label>
                <div>
                    <label th:each="rgon : ${rgonInfos}" style="margin-right: 12px;">
                        <input type="checkbox" name="rgonCheck"
                               th:value="${rgon.rgonCd}"
                               th:checked="${rgon.rgonNm != '海外'}"/>
                        <span th:text="${rgon.rgonNm}">地域</span>
                    </label>
                </div>
            </div>
        </div>
        <div class="buttons">
            <button id="clearEvent" type="button">クリア</button>
            <button id="searchEvent" type="button">検索</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">
            問合せ先一覧
            <span style="margin-left: 8px;">件数:</span>
            <span id="record" th:text="${recordCount}">0</span>
        </div>
        <table>
            <thead>
            <tr>
                <th>選択</th>
                <th>問合せ先コード</th>
                <th>問合せ先名称</th>
                <th>問合せ先カナ</th>
                <th>電話番号</th>
                <th>都道府県</th>
                <th>地域</th>
                <th>URL</th>
            </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <div class="footer">
        <button id="cancelEvent" type="button">キャンセル</button>
        <button id="selectEvent" type="button">決定</button>
    </div>
</body>
</html>
